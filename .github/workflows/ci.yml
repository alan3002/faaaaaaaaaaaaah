name: App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'  # Only trigger when files inside the app directory change

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 💡 Explicitly move into the app folder before running pip
      - name: Install Dependencies
        run: |
          cd app
          pip install -r requirements.txt

      # 💡 Explicitly move into the app folder before running tests
      - name: Run Unit Tests
        run: |
          cd app
          pytest

      # 💡 Pass the folder context directly to the build command
      - name: Build Docker Image
        run: |
          docker build -t fastapi-devops ./app

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi-devops

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag Docker Image
        run: |
          docker tag fastapi-devops:latest 160686961672.dkr.ecr.us-east-2.amazonaws.com/devops-project-56:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 160686961672.dkr.ecr.us-east-2.amazonaws.com/devops-project-56:latest